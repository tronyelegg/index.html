<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKE Party Spec Builder</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 💎 다크 테크웨어 베이스 설정 */
        body { 
            background-color: #12151f; color: white; 
            font-family: 'Noto Sans KR', 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .top-controls { margin-bottom: 20px; display: flex; gap: 15px; }
        button { 
            padding: 12px 25px; font-size: 15px; font-weight: bold; cursor: pointer; 
            border-radius: 8px; border: none; outline: none; transition: 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: white;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        #testBtn { background-color: #3F51B5; }
        #downloadBtn { background-color: #00E676; color: #000; display: none; }
        #clearBtn { background-color: #E91E63; display: none; }

        /* 📸 실제 이미지로 캡처될 영역 (상단 스펙 카드) */
        #capture-area { 
            background: linear-gradient(135deg, #1a1e2e, #12151f); 
            border: 2px solid #4FC3F7; width: 1000px; padding: 30px; 
            border-radius: 16px; box-shadow: 0 0 25px rgba(79, 195, 247, 0.15); 
            box-sizing: border-box; margin-bottom: 30px;
        }

        /* 헤더 정보 */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #4FC3F7; font-size: 32px; letter-spacing: 1px; }
        .header .server-info { font-size: 15px; color: #8892b0; margin-top: 5px; }
        .header .total-cp { text-align: right; }
        .header .total-cp h2 { margin: 0; font-size: 28px; color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* 🌟 5개 파티 슬롯 영역 */
        .slots-container { display: flex; gap: 15px; justify-content: center; min-height: 220px;}
        .slot { 
            flex: 1; background: rgba(0, 0, 0, 0.4); border: 2px dashed #4f5b82; 
            border-radius: 12px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.2s; position: relative; overflow: hidden; padding: 15px; text-align: center;
        }
        .slot.filled { border: 2px solid #00E676; background: rgba(0, 230, 118, 0.05); }
        .slot:hover { border-color: #4FC3F7; }
        
        .empty-icon { font-size: 48px; color: #4f5b82; font-weight: 100; }
        
        .slot-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 5px; word-break: keep-all;}
        .slot-badge { background-color: #E91E63; color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 10px; }
        .slot-cp { font-size: 22px; font-weight: 900; color: #FFD700; margin-bottom: 10px; }
        .slot-stats { font-size: 12px; color: #a6accd; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 5px;}
        .slot-ovr { font-size: 11px; color: #4FC3F7; word-break: keep-all; }

        .footer { margin-top: 20px; text-align: right; font-size: 11px; color: #4f5b82; }

        /* 👇 하단 전체 캐릭터 그리드 영역 */
        .pool-title { width: 1000px; text-align: left; font-size: 18px; color: #a6accd; border-bottom: 1px solid #4f5b82; padding-bottom: 10px; margin-bottom: 15px; }
        .char-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 10px; width: 1000px; padding-bottom: 50px;
        }
        .grid-item { 
            background: #1e2233; border: 1px solid #2e344e; border-radius: 8px; 
            padding: 12px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .grid-item:hover { background: #292d42; border-color: #4FC3F7; transform: translateY(-2px); }
        .grid-item.selected { opacity: 0.4; pointer-events: none; border-color: #E91E63; }
        .grid-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .grid-cp { font-size: 12px; color: #a6accd; }

        .placeholder { width: 100%; text-align: center; color: #4f5b82; padding: 50px 0; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div class="top-controls">
        <button id="testBtn">테스트 데이터 로드</button>
        <button id="clearBtn">파티 초기화</button>
        <button id="downloadBtn">📸 스펙 카드 이미지 저장</button>
    </div>

    <!-- 캡처 대상 영역 -->
    <div id="capture-area">
        <div class="header">
            <div>
                <h1 id="playerName">WAITING...</h1>
                <div class="server-info" id="serverInfo">서버: - | 싱크로 레벨: -</div>
            </div>
            <div class="total-cp">
                <span style="font-size: 13px; color: #8892b0;">Party Combat Power</span>
                <h2 id="totalCp">0</h2>
            </div>
        </div>

        <!-- 5개의 빈 슬롯 -->
        <div class="slots-container" id="slotsContainer">
            <!-- 자바스크립트로 렌더링 됩니다 -->
        </div>

        <div class="footer" id="timeStamp">
            Generated by NIKKE Spec Builder
        </div>
    </div>

    <!-- 하단 캐릭터 풀 영역 -->
    <div class="pool-title">내 니케 목록 (클릭하여 상단 슬롯에 편성하세요)</div>
    <div class="char-grid" id="charGrid">
        <div class="placeholder">게임에서 스크립트를 실행하여 데이터를 전송해주세요.</div>
    </div>

    <script>
        let allCharacters = [];
        let selectedCharacters = []; // 최대 5명 저장

        // 1. 상단 슬롯 5개 렌더링
        function renderSlots() {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            let partyCp = 0;

            for (let i = 0; i < 5; i++) {
                const char = selectedCharacters[i];
                const slot = document.createElement('div');
                
                if (char) {
                    partyCp += char.cp;
                    slot.className = 'slot filled';
                    slot.innerHTML = `
                        <div class="slot-name">${char.name}</div>
                        <div class="slot-badge">${char.break}</div>
                        <div class="slot-cp">${char.cp.toLocaleString()}</div>
                        <div class="slot-stats">S: ${char.skill} | E: ${char.equip}</div>
                        <div class="slot-ovr">${char.overload !== '-' ? char.overload : '오버없음'}</div>
                    `;
                    // 클릭 시 편성 해제
                    slot.onclick = () => removeChar(char);
                } else {
                    slot.className = 'slot';
                    slot.innerHTML = `<div class="empty-icon">+</div>`;
                }
                container.appendChild(slot);
            }
            document.getElementById('totalCp').innerText = partyCp.toLocaleString();
            
            // 버튼 상태 업데이트
            document.getElementById('downloadBtn').style.display = selectedCharacters.length > 0 ? 'block' : 'none';
            document.getElementById('clearBtn').style.display = selectedCharacters.length > 0 ? 'block' : 'none';
        }

        // 2. 하단 캐릭터 그리드 렌더링
        function renderGrid() {
            const grid = document.getElementById('charGrid');
            grid.innerHTML = '';

            allCharacters.forEach(char => {
                const isSelected = selectedCharacters.includes(char);
                const item = document.createElement('div');
                item.className = `grid-item ${isSelected ? 'selected' : ''}`;
                item.innerHTML = `
                    <div class="grid-name">${char.name}</div>
                    <div class="grid-cp">⚔️ ${char.cp.toLocaleString()}</div>
                `;
                if (!isSelected) {
                    item.onclick = () => addChar(char);
                }
                grid.appendChild(item);
            });
        }

        // 3. 파티 추가/제거 로직
        function addChar(char) {
            if (selectedCharacters.length < 5) {
                selectedCharacters.push(char);
                renderSlots();
                renderGrid();
            } else {
                alert("파티는 최대 5명까지만 편성할 수 있습니다!");
            }
        }

        function removeChar(char) {
            selectedCharacters = selectedCharacters.filter(c => c !== char);
            renderSlots();
            renderGrid();
        }

        // 초기화 버튼
        document.getElementById('clearBtn').onclick = () => {
            selectedCharacters = [];
            renderSlots();
            renderGrid();
        };

        // 데이터 수신 및 초기 렌더링
        function initData(data) {
            document.getElementById('playerName').innerText = data.playerName;
            document.getElementById('serverInfo').innerText = `서버: ${data.server} | 싱크로 레벨: Lv.${data.synchroLevel}`;
            
            const now = new Date();
            document.getElementById('timeStamp').innerText = `Generated by NIKKE Spec Builder | ${now.toLocaleString()}`;

            allCharacters = data.characters;
            selectedCharacters = [];
            
            // 편의를 위해 전투력 최상위 5명을 자동으로 편성해 둡니다.
            selectedCharacters = allCharacters.slice(0, 5); 
            
            renderSlots();
            renderGrid();
        }

        // 윈도우 통신 리스너 (스크립트에서 보낸 데이터 수신)
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'NIKKE_SPEC_DATA') {
                initData(event.data.payload);
            }
        });

        // 캡처 다운로드 (html2canvas)
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const captureTarget = document.getElementById('capture-area');
            html2canvas(captureTarget, { backgroundColor: '#12151f', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `NIKKE_Party_${document.getElementById('playerName').innerText}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        // 테스트 데이터 버튼
        document.getElementById('testBtn').addEventListener('click', () => {
            const dummyData = {
                playerName: "지휘관", server: "Korea", synchroLevel: 481,
                characters: [
                    { name: "라피 : 레드 후드", break: "5코강", skill: "10/10/10", equip: "5/5/5/0", overload: "우코:97.0%, 공증:43.7%", cp: 259728 },
                    { name: "마스트 : 로망틱 메이드", break: "풀코", skill: "10/10/10", equip: "5/5/5/5", overload: "장탄:68.0%, 크확:11.8%", cp: 245636 },
                    { name: "앵커 : 이노센트 메이드", break: "3돌", skill: "7/7/7", equip: "5/5/0/0", overload: "공증:22.0%", cp: 239522 },
                    { name: "모더니아", break: "3돌", skill: "10/10/10", equip: "5/5/5/5", overload: "장탄:112%, 공증:30%", cp: 215000 },
                    { name: "크라운", break: "명함", skill: "10/10/10", equip: "5/5/0/0", overload: "-", cp: 201000 },
                    { name: "앨리스", break: "4코강", skill: "10/4/10", equip: "5/5/5/5", overload: "차속:14%, 장탄:60%", cp: 230000 },
                    { name: "아스카", break: "풀돌", skill: "10/10/10", equip: "0/0/0/0", overload: "-", cp: 164762 },
                    { name: "레이", break: "명함", skill: "4/4/4", equip: "0/0/0/0", overload: "-", cp: 140000 }
                ]
            };
            initData(dummyData);
        });

        // 빈 슬롯 최초 렌더링
        renderSlots();
    </script>
</body>
</html>
