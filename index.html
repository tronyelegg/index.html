<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKE Spec Card Generator</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 💎 다크 테크웨어 스타일 UI */
        body { 
            background-color: #0f111a; color: white; 
            font-family: 'Noto Sans KR', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; margin-top: 30px;
        }
        
        .controls { margin-bottom: 20px; display: flex; gap: 15px; }
        button { 
            padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; 
            border-radius: 8px; border: none; outline: none; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { transform: translateY(-2px); }
        #testBtn { background-color: #FF5722; color: white; }
        #downloadBtn { background-color: #00E676; color: #000; display: none; } /* 데이터가 들어오면 나타남 */

        /* 📸 실제 이미지로 캡처될 영역 */
        #capture-area { 
            background: linear-gradient(135deg, #1a1c29, #0f111a); 
            border: 2px solid #00E676; width: 800px; padding: 30px; 
            border-radius: 20px; box-shadow: 0 0 30px rgba(0, 230, 118, 0.15); 
            box-sizing: border-box;
        }

        /* 헤더 영역 (이름, 서버, 총 투력) */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; color: #00E676; font-size: 36px; text-transform: uppercase; letter-spacing: 2px; }
        .header .server-info { font-size: 16px; color: #8892b0; margin-top: 5px; }
        .header .total-cp { text-align: right; }
        .header .total-cp h2 { margin: 0; font-size: 32px; color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        .header .total-cp span { font-size: 14px; color: #8892b0; text-transform: uppercase; }

        /* 캐릭터 리스트 영역 */
        .character-list { display: flex; flex-direction: column; gap: 15px; }
        .char-card { 
            background: rgba(255,255,255,0.03); padding: 15px 20px; 
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center; 
            border-left: 6px solid #FF4081; position: relative; overflow: hidden;
        }
        
        .char-info h3 { margin: 0 0 8px 0; color: #fff; font-size: 22px; display: flex; align-items: center; gap: 10px; }
        .break-badge { background-color: #FF4081; color: white; font-size: 12px; padding: 3px 8px; border-radius: 4px; }
        
        .char-stats { font-size: 14px; color: #a6accd; display: flex; gap: 15px; }
        .char-stats span { background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 4px; }
        .overload-text { color: #40C4FF; } /* 오버로드 텍스트 색상 */

        .char-cp { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        
        .footer { margin-top: 25px; text-align: right; font-size: 12px; color: #4f5b82; font-family: monospace; }
        .placeholder { text-align: center; color: #4f5b82; padding: 50px 0; font-size: 18px; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="testBtn">🧪 테스트용 가짜 데이터 주입</button>
        <button id="downloadBtn">⬇️ 스펙 카드 이미지 저장</button>
    </div>

    <div id="capture-area">
        <div class="header">
            <div>
                <h1 id="playerName">WAITING...</h1>
                <div class="server-info" id="serverInfo">서버: - | 싱크로 레벨: -</div>
            </div>
            <div class="total-cp">
                <span>Total Combat Power (Top 5)</span>
                <h2 id="totalCp">0</h2>
            </div>
        </div>

        <div class="character-list" id="charList">
            <div class="placeholder">게임에서 스크립트를 실행하여 데이터를 전송해주세요.</div>
        </div>

        <div class="footer" id="timeStamp">
            Generated by NIKKE Omni-Hunter Engine
        </div>
    </div>

    <script>
        // 1. 데이터를 화면(DOM)에 예쁘게 그리는 함수
        function renderData(data) {
            document.getElementById('playerName').innerText = data.playerName;
            document.getElementById('serverInfo').innerText = `서버: ${data.server} | 싱크로 레벨: Lv.${data.synchroLevel}`;
            
            const list = document.getElementById('charList');
            list.innerHTML = '';
            let totalCp = 0;

            // 받아온 캐릭터 데이터를 반복해서 카드(div)로 생성
            data.characters.forEach(c => {
                totalCp += c.cp;
                const charDiv = document.createElement('div');
                charDiv.className = 'char-card';
                charDiv.innerHTML = `
                    <div class="char-info">
                        <h3>${c.name} <span class="break-badge">${c.break}</span></h3>
                        <div class="char-stats">
                            <span>스킬: ${c.skill}</span>
                            <span>장비: ${c.equip}</span>
                            <span class="overload-text">${c.overload !== '-' ? c.overload : '오버옵션 없음'}</span>
                        </div>
                    </div>
                    <div class="char-cp">${c.cp.toLocaleString()}</div>
                `;
                list.appendChild(charDiv);
            });

            document.getElementById('totalCp').innerText = totalCp.toLocaleString();
            
            // 현재 날짜 시간 기록
            const now = new Date();
            document.getElementById('timeStamp').innerText = `Generated by NIKKE Omni-Hunter Engine | ${now.toLocaleString()}`;

            // 다운로드 버튼 활성화
            document.getElementById('downloadBtn').style.display = 'block';
        }

        // 2. 다른 창(게임 사이트)에서 쏴준 데이터를 받는 리스너 (PostMessage)
        window.addEventListener('message', (event) => {
            // 보안 확인이나 타입 확인 로직 (필요시 추가)
            if (event.data && event.data.type === 'NIKKE_SPEC_DATA') {
                renderData(event.data.payload);
            }
        });

        // 3. 이미지로 다운로드하는 로직 (html2canvas)
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const captureTarget = document.getElementById('capture-area');
            html2canvas(captureTarget, {
                backgroundColor: '#0f111a', // 배경색 지정
                scale: 2 // 화질 2배(레티나 디스플레이 대응)
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `NIKKE_Card_${document.getElementById('playerName').innerText}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        // 4. 스크립트 연결 전 미리 확인해볼 수 있는 테스트 버튼
        document.getElementById('testBtn').addEventListener('click', () => {
            const dummyData = {
                playerName: "지휘관", 
                server: "Korea", 
                synchroLevel: 481,
                characters: [
                    { name: "라피 : 레드 후드", break: "5코강", skill: "10/10/10", equip: "5/5/5/0", overload: "우코:97.0%, 공증:43.7%", cp: 259728 },
                    { name: "마스트 : 로망틱 메이드", break: "풀코", skill: "10/10/10", equip: "5/5/5/5", overload: "장탄:68.0%, 크확:11.8%", cp: 245636 },
                    { name: "앵커 : 이노센트 메이드", break: "3돌", skill: "7/7/7", equip: "5/5/0/0", overload: "공증:22.0%", cp: 239522 },
                    { name: "브래디", break: "명함", skill: "4/4/4", equip: "0/0/0/0", overload: "-", cp: 203952 },
                    { name: "아스카 : WILLE", break: "풀돌", skill: "10/10/10", equip: "0/0/0/0", overload: "-", cp: 164762 }
                ]
            };
            renderData(dummyData);
        });
    </script>
</body>
</html>
